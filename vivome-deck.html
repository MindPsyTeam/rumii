document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

p: 2px solid var(--navy);\n    font-size: 30px;\n    line-height: 1.5;\n    color: var(--ink);\n    max-width: 1500px;\n  }\n  .s8-coda strong { color: var(--navy); font-weight: 600; }\n\n  /* ───── Slide 9: Research questions ───── */\n  .s9 {\n    height: 100%;\n    padding: 100px 120px 100px;\n    display: grid;\n    grid-template-columns: 1fr 620px;\n    gap: 80px;\n    box-sizing: border-box;\n    align-items: center;\n  }\n  .s9-lede { font-size: 32px; line-height: 1.5; color: var(--ink); margin-top: 28px; max-width: 1080px; }\n  .s9-qs { display: flex; flex-direction: column; gap: 26px; margin-top: 44px; }\n  .s9-qs .q {\n    font-size: 30px;\n    line-height: 1.45;\n    color: var(--ink);\n    padding-left: 22px;\n    border-left: 2px solid var(--peach);\n    max-width: 940px;\n  }\n  .s9-qs .q strong { color: var(--navy); font-weight: 600; }\n  .s9-coda {\n    margin-top: 36px;\n    font-size: 26px;\n    line-height: 1.5;\n    color: var(--grey-warm);\n    font-style: italic;\n    max-width: 980px;\n  }\n\n  /* ───── Slide 10: Where we are ───── */\n  .s10 {\n    height: 100%;\n    padding: 100px 120px 100px;\n    display: flex;\n    flex-direction: column;\n    box-sizing: border-box;\n  }\n  .s10-lede { font-size: 32px; line-height: 1.5; color: var(--ink); margin-top: 28px; max-width: 1600px; }\n  .s10-lede strong { color: var(--navy); font-weight: 600; }\n  .s10-rows {\n    margin-top: 48px;\n    display: grid;\n    grid-template-columns: 1fr 1fr;\n    column-gap: 80px;\n    row-gap: 28px;\n    flex: 1;\n  }\n  .s10-row { display: grid; grid-template-columns: 56px 1fr; gap: 20px; align-items: start; }\n  .s10-row .marker {\n    width: 14px; height: 14px;\n    border-radius: 50%;\n    background: var(--peach);\n    border: 2px solid var(--navy);\n    margin-top: 12px;\n    margin-left: 22px;\n  }\n  .s10-row .marker.gold { background: var(--gold); }\n  .s10-row .marker.sage { background: var(--sage); }\n  .s10-row .text { font-size: 27px; line-height: 1.45; color: var(--ink); }\n  .s10-row .text strong { font-family: 'Lato', sans-serif; font-weight: 600; color: var(--navy); display: block; margin-bottom: 6px; font-size: 30px; }\n  .s10-coda {\n    margin-top: 32px;\n    font-family: 'Lato', sans-serif;\n    font-weight: 600;\n    font-size: 32px;\n    color: var(--navy);\n    letter-spacing: 0.02em;\n  }\n\n  /* ───── Slide 11: Implications & applications ───── */\n  .s11i {\n    height: 100%;\n    padding: 100px 120px 100px;\n    display: grid;\n    grid-template-columns: 1.05fr 1fr;\n    gap: 80px;\n    box-sizing: border-box;\n  }\n  .s11i-col { display: flex; flex-direction: column; }\n  .s11i-h {\n    font-family: 'Lato', sans-serif;\n    font-weight: 600;\n    font-size: 38px;\n    color: var(--navy);\n    margin-top: 12px;\n    line-height: 1.2;\n  }\n  .s11i-lede { font-size: 30px; line-height: 1.5; color: var(--ink); margin-top: 24px; max-width: 820px; }\n  .s11i-emph {\n    margin-top: 32px;\n    padding: 28px 32px;\n    background: rgba(255, 174, 165, 0.22);\n    border-left: 4px solid var(--peach-deep);\n    font-family: 'Lato', sans-serif;\n    font-weight: 600;\n    font-size: 30px;\n    line-height: 1.4;\n    color: var(--navy);\n    max-width: 720px;\n  }\n  .s11i-emph .lighter { display: block; margin-top: 10px; font-family: 'Raleway', sans-serif; font-weight: 400; font-style: italic; font-size: 25px; color: var(--ink); }\n  .s11i-apps { display: flex; flex-direction: column; gap: 18px; margin-top: 36px; }\n  .s11i-app {\n    display: grid;\n    grid-template-columns: 56px 1fr;\n    gap: 22px;\n    align-items: start;\n    padding: 18px 0;\n    border-top: 1px solid var(--rule);\n  }\n  .s11i-apps .s11i-app:last-child { border-bottom: 1px solid var(--rule); }\n  .s11i-app .num {\n    font-family: 'Lato', sans-serif;\n    font-weight: 600;\n    font-size: 22px;\n    color: var(--peach-deep);\n    letter-spacing: 0.14em;\n    padding-top: 4px;\n  }\n  .s11i-app .body { font-size: 27px; line-height: 1.45; color: var(--ink); }\n  .s11i-app .body strong { font-family: 'Lato', sans-serif; font-weight: 600; color: var(--navy); display: block; margin-bottom: 6px; font-size: 29px; }\n\n  /* ───── Slide 12: Invitation ───── */\n  .s11 {\n    height: 100%;\n    padding: 100px 120px 120px;\n    display: grid;\n    grid-template-columns: 1fr 380px;\n    gap: 64px;\n    box-sizing: border-box;\n  }\n  .s11-main { display: flex; flex-direction: column; }\n  .s11-lede { font-size: 30px; line-height: 1.5; color: var(--ink); margin-top: 22px; max-width: 1200px; }\n  .s11-list { margin-top: 28px; display: flex; flex-direction: column; gap: 16px; }\n  .s11-list .item {\n    display: grid;\n    grid-template-columns: 220px 1fr;\n    gap: 28px;\n    padding: 14px 0;\n    border-top: 1px solid var(--rule);\n    font-size: 26px;\n    line-height: 1.4;\n    color: var(--ink);\n    max-width: 1300px;\n  }\n  .s11-list .item:last-child { border-bottom: 1px solid var(--rule); }\n  .s11-list .item .who {\n    font-family: 'Lato', sans-serif;\n    font-weight: 600;\n    color: var(--navy);\n    font-size: 26px;\n  }\n  .s11-coda {\n    margin-top: 28px;\n    font-family: 'Raleway', sans-serif;\n    font-style: italic;\n    font-size: 28px;\n    line-height: 1.45;\n    color: var(--navy);\n    max-width: 1100px;\n    border-top: 2px solid var(--navy);\n    padding-top: 24px;\n  }\n  .s11-art {\n    align-self: end;\n    width: 100%;\n  }\n\n  /* Section labels */\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<script type=\"application/json\" id=\"speaker-notes\">\n[\n  \"Welcome. This is an introduction to a new layer of human health — the vivome — and to the instrument we've built to measure it. Rumii means a guest house, in the spirit of the poem. The deck itself is short. The middle of it is a single short film of a house being built, layer by layer, that does most of the conceptual work for us.\",\n  \"I want to start with a real question. What actually explains whether someone gets well? Their inheritance? Their biology? Their environment? Or how they are, day to day, actually living? The science we have is honest about how much of this it can answer, and how much it cannot.\",\n  \"Here's how we picture it. The science of human health has been built up in layers — and each layer has revealed something profound. But each has also been honest about what it cannot yet explain. We made a short film that lets you see all of those layers as a house being built, with the missing layer arriving last. I'll let it speak for itself.\",\n  \"This is the honest gap, and it shows up in mental and physical health alike. Family studies tell us depression, schizophrenia, and inflammatory bowel conditions like Crohn's all run strongly in families. Our most sophisticated genetic studies, with millions of people sequenced, currently account for only a fraction of that inherited risk in any of them. The behavioural side of the picture, sleep, social rhythm, stress, daily routine, has not been continuously measurable at all. That missing layer is the same in mind and body.\",\n  \"Decades of research show what clinicians have always known. Mind and body are not separate systems. Disrupted sleep alters the immune system. The immune system shapes mood. Loneliness predicts heart disease and earlier death. The shared upstream layer is how a person actually lives. The vivome is the layer at which mental and physical health become inseparable.\",\n  \"The vivome is the science of finally seeing how people actually live. That comes with a responsibility. The vivome is built with people, not on them. What we measure is not who someone is. It is the rhythm of how they are living — and that rhythm is theirs.\",\n  \"Why is this possible now? Three things had to converge. An instrument almost everyone already carries. A way to do this without draining the battery. And the science to make sense of what's sensed. The instrument exists. The science is ready. The vivome can finally be measured.\",\n  \"This is what we've built. Rumii is the first end-to-end instrument for the vivome. A sensing layer that runs gently in the background. A pattern-recognition pipeline. A clinically-led reasoning system. And a model that learns, over time, what helps whom. Live, running, and gathering data now.\",\n  \"What does this open up for research? A continuous, real-world measurement of how people live transforms what we can study. The vivome can sit alongside the studies that are already underway, adding ecological reality without burdening the people taking part.\",\n  \"Here's where we are. The instrument is built. The science is in flight. Smartphone sensing is live with strong real-world participation rates. A first clinical trial deployment is being set up. There is a European research consortium in youth mental health, multi-site. We're funded by Innovate UK, supported by the National Health Service Clinical Entrepreneur Programme, and backed by a strategic anchor in global pharma.\",\n  \"And here is what this opens up. Continuous measurement of how people are actually living, at scale, makes a new kind of model possible: a real-world model that learns to predict population health trajectories, and when and how to intervene, in ways that optimise health. The applications follow from that. Supporting engagement and retention in clinical trials. Real-world evidence of whether therapeutics actually work in the lives of the people taking them. Population health prediction. And helping providers and payers match what they offer to what people actually need.\",\n  \"And so an invitation. We're looking for partners who see what we see. Researchers with cohort studies that could add the vivome layer. Clinicians for whom what happens between appointments shapes everything. People with lived experience who would help shape what the vivome should and should not see. And methodologists who would help validate and publish the first wave. The science of how the guest house is being lived in has, until now, been beyond our reach. It isn't anymore.\"\n]\n<\u002Fscript>\n\n<deck-stage width=\"1920\" height=\"1080\">\n\n  <!-- ─────────────── 1. TITLE ─────────────── -->\n  <section data-label=\"01 Title\">\n    <div class=\"s1\">\n      <div class=\"s1-text\">\n        <div class=\"eyebrow\">An introduction<\u002Fdiv>\n        <div class=\"s1-title\">Rumii's<br>guest house<\u002Fdiv>\n        <div class=\"s1-quote\">\"This being human is a guest house.\"<\u002Fdiv>\n        <div class=\"s1-attrib\">Rumi, The Guest House, trans. Coleman Barks<\u002Fdiv>\n        <div class=\"s1-footer\">The vivome: the missing layer of human health<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"s1-art\">\n        <!-- Blueprint frame, axonometric, dashed -->\n        <svg viewBox=\"0 0 760 760\" width=\"100%\" height=\"100%\">\n          <defs>\n            <pattern id=\"grid-s1\" width=\"40\" height=\"40\" patternUnits=\"userSpaceOnUse\">\n              <path d=\"M 40 0 L 0 0 0 40\" fill=\"none\" stroke=\"#374B73\" stroke-width=\"0.4\" opacity=\"0.08\"><\u002Fpath>\n            <\u002Fpattern>\n          <\u002Fdefs>\n          <rect x=\"0\" y=\"0\" width=\"760\" height=\"760\" fill=\"url(#grid-s1)\"><\u002Frect>\n\n          <!-- Scale tick -->\n          <g stroke=\"#374B73\" stroke-width=\"0.6\" fill=\"none\" opacity=\"0.45\">\n            <line x1=\"100\" y1=\"200\" x2=\"100\" y2=\"600\"><\u002Fline>\n            <line x1=\"92\" y1=\"200\" x2=\"108\" y2=\"200\"><\u002Fline>\n            <line x1=\"92\" y1=\"600\" x2=\"108\" y2=\"600\"><\u002Fline>\n          <\u002Fg>\n          <text x=\"86\" y=\"402\" text-anchor=\"end\" font-family=\"'Lato', sans-serif\" font-size=\"13\" fill=\"#374B73\" opacity=\"0.5\">scale<\u002Ftext>\n\n          <!-- Axonometric house, dashed -->\n          <g stroke=\"#374B73\" stroke-width=\"1.2\" fill=\"none\" stroke-dasharray=\"6 5\">\n            <!-- Front face -->\n            <rect x=\"180\" y=\"320\" width=\"380\" height=\"270\"><\u002Frect>\n            <!-- Roof front triangle -->\n            <polygon points=\"180,320 370,180 560,320\"><\u002Fpolygon>\n            <!-- Side face (depth) -->\n            <polygon points=\"560,320 615,290 615,560 560,590\"><\u002Fpolygon>\n            <!-- Roof side -->\n            <polygon points=\"180,320 235,290 615,290 560,320\"><\u002Fpolygon>\n            <!-- Roof apex side -->\n            <polygon points=\"370,180 425,150 615,290 560,320\"><\u002Fpolygon>\n          <\u002Fg>\n\n          <!-- Inner divisions, lighter -->\n          <g stroke=\"#374B73\" stroke-width=\"0.7\" fill=\"none\" stroke-dasharray=\"4 4\" opacity=\"0.55\">\n            <line x1=\"180\" y1=\"455\" x2=\"560\" y2=\"455\"><\u002Fline>\n            <line x1=\"560\" y1=\"455\" x2=\"615\" y2=\"425\"><\u002Fline>\n            <line x1=\"307\" y1=\"320\" x2=\"307\" y2=\"590\"><\u002Fline>\n            <line x1=\"434\" y1=\"320\" x2=\"434\" y2=\"590\"><\u002Fline>\n          <\u002Fg>\n\n          <!-- Door indication -->\n          <g stroke=\"#374B73\" stroke-width=\"0.7\" fill=\"none\" stroke-dasharray=\"3 3\" opacity=\"0.55\">\n            <rect x=\"350\" y=\"495\" width=\"44\" height=\"95\"><\u002Frect>\n          <\u002Fg>\n\n          <!-- Notation -->\n          <g font-family=\"'Lato', sans-serif\" font-size=\"12\" fill=\"#374B73\" opacity=\"0.45\" letter-spacing=\"0.08em\">\n            <text x=\"180\" y=\"640\">FRAME<\u002Ftext>\n            <text x=\"430\" y=\"640\">a guest house<\u002Ftext>\n          <\u002Fg>\n        <\u002Fsvg>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"rumi-footer\">* Rumi, <span class=\"work\">The Guest House<\u002Fspan>, trans. Coleman Barks<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ─────────────── 2. THOUGHT EXPERIMENT ─────────────── -->\n  <section data-label=\"02 Thought experiment\">\n    <div class=\"s2\">\n      <div class=\"eyebrow\">A thought experiment<\u002Fdiv>\n      <h1 class=\"slide-title\">What explains whether<br>someone stays well?<\u002Fh1>\n      <span class=\"rule-navy\" style=\"margin-top: 8px;\"><\u002Fspan>\n      <div class=\"questions\">\n        <div class=\"q\">What explains whether someone develops a chronic illness, and whether their treatment works?<\u002Fdiv>\n        <div class=\"q\">What explains whether someone becomes depressed, and whether they recover?<\u002Fdiv>\n        <div class=\"q\"><em>Their inheritance? Their biology? Their environment? Or how they actually live?<\u002Fem><\u002Fdiv>\n        <div class=\"pause\">(A pause.)<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ─────────────── 3. BUILD SEQUENCE ─────────────── -->\n  <section data-label=\"03 Guest house build sequence\">\n    <div class=\"s3\">\n      <div class=\"s3-text\">\n        <div class=\"eyebrow\">A way of seeing<\u002Fdiv>\n        <h1 class=\"slide-title\" style=\"font-size: 56px; line-height: 1.1;\">Rumii's<br>guest house<\u002Fh1>\n        <span class=\"rule-navy\"><\u002Fspan>\n        <p>The science of human health has been built up in layers. Each layer has revealed something profound about who we are. Each has also been honest about what it cannot yet explain.<\u002Fp>\n        <p>We've found a way to picture all of this, and the layer that's been missing, as a house being built.<\u002Fp>\n        <p style=\"font-family: 'Lato', sans-serif; font-weight: 600; color: var(--navy); margin-top: 8px;\">Watch. →<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"s3-frame\">\n        <iframe data-resource-id=\"buildSequence\" title=\"Rumii's guest house build sequence\" loading=\"lazy\"><\u002Fiframe>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"rumi-footer\">* Rumi, <span class=\"work\">The Guest House<\u002Fspan>, trans. Coleman Barks<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ─────────────── 4. HONEST GAP ─────────────── -->\n  <section data-label=\"04 The honest gap\">\n    <div class=\"s4\">\n      <div class=\"eyebrow\">The honest gap<\u002Fdiv>\n      <h1 class=\"slide-title\" style=\"margin-top: 18px;\">What our best science can,<br>and cannot yet, explain<\u002Fh1>\n      <p class=\"s4-intro\">Family studies tell us many conditions run in families. But our most sophisticated genetic studies, even with millions of people sequenced, currently account for only a fraction of that inherited risk. The pattern holds across mental and physical health.<\u002Fp>\n\n      <div class=\"s4-figs\">\n        <div class=\"fig-block\">\n          <div class=\"fig-tag\">Mind<\u002Fdiv>\n          <div class=\"fig-name\">Major depression<\u002Fdiv>\n          <div class=\"bar-wrap\">\n            <div class=\"bar-row\">\n              <div class=\"bar-label\">What family studies suggest is inherited<span class=\"num\">~37%<\u002Fspan><\u002Fdiv>\n              <div class=\"bar-track\"><div class=\"bar-fill\" style=\"width: 37%\"><\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"bar-row\">\n              <div class=\"bar-label\">What our genetic studies can currently account for<span class=\"num\">~12%<\u002Fspan><\u002Fdiv>\n              <div class=\"bar-track\"><div class=\"bar-fill deeper\" style=\"width: 12%\"><\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"fig-block\">\n          <div class=\"fig-tag\">Mind<\u002Fdiv>\n          <div class=\"fig-name\">Schizophrenia<\u002Fdiv>\n          <div class=\"bar-wrap\">\n            <div class=\"bar-row\">\n              <div class=\"bar-label\">What family studies suggest is inherited<span class=\"num\">~80%<\u002Fspan><\u002Fdiv>\n              <div class=\"bar-track\"><div class=\"bar-fill\" style=\"width: 80%\"><\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"bar-row\">\n              <div class=\"bar-label\">What our genetic studies can currently account for<span class=\"num\">~24%<\u002Fspan><\u002Fdiv>\n              <div class=\"bar-track\"><div class=\"bar-fill deeper\" style=\"width: 24%\"><\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"fig-block body\">\n          <div class=\"fig-tag\">Body<\u002Fdiv>\n          <div class=\"fig-name\">Crohn's disease<\u002Fdiv>\n          <div class=\"bar-wrap\">\n            <div class=\"bar-row\">\n              <div class=\"bar-label\">What twin studies suggest is inherited<span class=\"num\">~75%<\u002Fspan><\u002Fdiv>\n              <div class=\"bar-track\"><div class=\"bar-fill\" style=\"width: 75%\"><\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"bar-row\">\n              <div class=\"bar-label\">What our genetic studies can currently account for<span class=\"num\">~26%<\u002Fspan><\u002Fdiv>\n              <div class=\"bar-track\"><div class=\"bar-fill deeper\" style=\"width: 26%\"><\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <p class=\"s4-coda\">The same gap shows up in mental and in physical health. And in both, the behavioural side of the picture, sleep, social rhythm, stress, daily routine, has not been continuously measurable at all.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"source-footer\">Sources: Sullivan et al. 2000; Wray et al. 2018; Trubetskoy et al. 2022 (Psychiatric Genomics Consortium); Halfvarson et al. 2003; Brant 2011; de Lange et al. 2017.<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ─────────────── 5. MIND & BODY ─────────────── -->\n  <section data-label=\"05 Mind and body, one layer\">\n    <div class=\"s5\">\n      <div class=\"s5-text\">\n        <div class=\"eyebrow\">Mind and body, one layer<\u002Fdiv>\n        <h1 class=\"slide-title\" style=\"margin-top: 12px; font-size: 60px;\">Where mental and physical<br>health meet<\u002Fh1>\n        <p style=\"margin-top: 28px;\">Decades of research show what clinicians have always known: the mind and the body are not separate systems.<\u002Fp>\n        <p>Disrupted sleep alters the immune system. The immune system, in turn, shapes mood, energy, and motivation, for some people more than others.<\u002Fp>\n        <p>Loneliness predicts both heart disease and earlier death.<\u002Fp>\n        <p>Stress, social withdrawal, and routine breakdown sit upstream of both physical decline and mental ill health.<\u002Fp>\n        <p>And how a person is living often tells us which version of an illness they are facing: the one that responds to one kind of help, or another.<\u002Fp>\n        <div class=\"s5-emph\">The shared upstream layer, and the most modifiable one, is how a person actually lives. The vivome is the layer at which mental and physical health become inseparable.<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"s5-art\">\n        <svg viewBox=\"0 0 540 720\" width=\"100%\" height=\"100%\">\n          <defs>\n            <marker id=\"arrow-s5\" viewBox=\"0 0 10 10\" refX=\"8\" refY=\"5\" markerWidth=\"7\" markerHeight=\"7\" orient=\"auto-start-reverse\">\n              <path d=\"M 0 0 L 10 5 L 0 10 z\" fill=\"#374B73\" opacity=\"0.55\"><\u002Fpath>\n            <\u002Fmarker>\n          <\u002Fdefs>\n\n          <!-- Three soft circles overlapping -->\n          <g opacity=\"0.55\">\n            <circle cx=\"270\" cy=\"220\" r=\"170\" fill=\"#FFAEA5\" opacity=\"0.55\"><\u002Fcircle>\n            <circle cx=\"180\" cy=\"430\" r=\"170\" fill=\"#89A19D\" opacity=\"0.45\"><\u002Fcircle>\n            <circle cx=\"360\" cy=\"430\" r=\"170\" fill=\"#FFC233\" opacity=\"0.4\"><\u002Fcircle>\n          <\u002Fg>\n\n          <!-- Outline -->\n          <g fill=\"none\" stroke=\"#374B73\" stroke-width=\"1.2\" opacity=\"0.7\">\n            <circle cx=\"270\" cy=\"220\" r=\"170\"><\u002Fcircle>\n            <circle cx=\"180\" cy=\"430\" r=\"170\"><\u002Fcircle>\n            <circle cx=\"360\" cy=\"430\" r=\"170\"><\u002Fcircle>\n          <\u002Fg>\n\n          <!-- Labels -->\n          <g font-family=\"'Lato', sans-serif\" font-weight=\"600\" fill=\"#374B73\" text-anchor=\"middle\">\n            <text x=\"270\" y=\"140\" font-size=\"24\">Mind &amp; mood<\u002Ftext>\n            <text x=\"125\" y=\"490\" font-size=\"24\">Behaviour<\u002Ftext>\n            <text x=\"415\" y=\"490\" font-size=\"24\">Biology<\u002Ftext>\n          <\u002Fg>\n\n          <!-- Bidirectional arrows around the centre -->\n          <g stroke=\"#374B73\" stroke-width=\"1.4\" fill=\"none\" opacity=\"0.55\">\n            <path d=\"M 240 305 Q 200 350 195 365\" marker-start=\"url(#arrow-s5)\" marker-end=\"url(#arrow-s5)\"><\u002Fpath>\n            <path d=\"M 300 305 Q 340 350 345 365\" marker-start=\"url(#arrow-s5)\" marker-end=\"url(#arrow-s5)\"><\u002Fpath>\n            <path d=\"M 250 430 Q 270 430 290 430\" marker-start=\"url(#arrow-s5)\" marker-end=\"url(#arrow-s5)\"><\u002Fpath>\n          <\u002Fg>\n\n          <!-- Caption -->\n          <text x=\"270\" y=\"660\" text-anchor=\"middle\" font-family=\"'Raleway', sans-serif\" font-style=\"italic\" font-size=\"18\" fill=\"#888780\">\n            One system. Influence runs in every direction.\n          <\u002Ftext>\n        <\u002Fsvg>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ─────────────── 6. DIGNITY ─────────────── -->\n  <section data-label=\"06 Dignity, not surveillance\">\n    <div class=\"s6\">\n      <div>\n        <div class=\"eyebrow\">The vivome and dignity<\u002Fdiv>\n        <h1 class=\"slide-title\" style=\"margin-top: 12px;\">Not surveillance. Recognition.<\u002Fh1>\n        <p class=\"body-md\" style=\"margin-top: 28px; max-width: 1000px;\">The vivome is the science of finally seeing how people actually live. That comes with a responsibility.<\u002Fp>\n        <p class=\"body-md\" style=\"margin-top: 18px; max-width: 1000px; font-family: 'Lato', sans-serif; font-weight: 600; color: var(--navy);\">The vivome is built with people, not on them.<\u002Fp>\n\n        <div class=\"s6-list\">\n          <div class=\"item\"><span class=\"dash\">·<\u002Fspan><span>Designed with people with lived experience from the start.<\u002Fspan><\u002Fdiv>\n          <div class=\"item\"><span class=\"dash\">·<\u002Fspan><span>No active input required: no diaries, no forms, no asking someone to perform their illness for the system.<\u002Fspan><\u002Fdiv>\n          <div class=\"item\"><span class=\"dash\">·<\u002Fspan><span>Consent and control belong to the person, not the system.<\u002Fspan><\u002Fdiv>\n          <div class=\"item\"><span class=\"dash\">·<\u002Fspan><span>What the vivome makes visible is offered back to the person, not extracted from them.<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"s6-coda\">What we measure is not who someone is. It is <strong>the rhythm of how they are living<\u002Fstrong>, and that rhythm is theirs.<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div>\n        <svg viewBox=\"0 0 480 600\" width=\"100%\" height=\"100%\">\n          <!-- Soft peach background circle -->\n          <circle cx=\"240\" cy=\"300\" r=\"240\" fill=\"#FFAEA5\" opacity=\"0.18\"><\u002Fcircle>\n\n          <!-- Open hand, simple line -->\n          <g stroke=\"#374B73\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n            <!-- Palm -->\n            <path d=\"M 130 380 Q 120 320 145 270 Q 175 230 220 230 L 320 230 Q 360 230 365 260 L 365 360 Q 360 410 310 420 L 200 420 Q 150 420 130 380 Z\"><\u002Fpath>\n            <!-- Fingers indication -->\n            <path d=\"M 220 230 L 220 200\"><\u002Fpath>\n            <path d=\"M 255 230 L 258 195\"><\u002Fpath>\n            <path d=\"M 290 230 L 295 200\"><\u002Fpath>\n            <path d=\"M 325 232 L 335 215\"><\u002Fpath>\n            <!-- Thumb -->\n            <path d=\"M 130 350 Q 100 340 95 310\"><\u002Fpath>\n          <\u002Fg>\n\n          <!-- Object offered: small soft figure (a doll) -->\n          <g>\n            <!-- Body -->\n            <ellipse cx=\"245\" cy=\"310\" rx=\"34\" ry=\"42\" fill=\"#FFAEA5\"><\u002Fellipse>\n            <!-- Head -->\n            <circle cx=\"245\" cy=\"265\" r=\"22\" fill=\"#F4C0D1\"><\u002Fcircle>\n            <!-- Glow -->\n            <circle cx=\"245\" cy=\"295\" r=\"58\" fill=\"#FFC233\" opacity=\"0.18\"><\u002Fcircle>\n          <\u002Fg>\n\n          <!-- Rays -->\n          <g stroke=\"#FFC233\" stroke-width=\"1.4\" stroke-linecap=\"round\" opacity=\"0.7\">\n            <line x1=\"245\" y1=\"200\" x2=\"245\" y2=\"180\"><\u002Fline>\n            <line x1=\"195\" y1=\"220\" x2=\"180\" y2=\"200\"><\u002Fline>\n            <line x1=\"295\" y1=\"220\" x2=\"310\" y2=\"200\"><\u002Fline>\n          <\u002Fg>\n\n          <!-- Caption -->\n          <text x=\"240\" y=\"510\" text-anchor=\"middle\" font-family=\"'Raleway', sans-serif\" font-style=\"italic\" font-size=\"18\" fill=\"#888780\">\n            Offered back. Not extracted.\n          <\u002Ftext>\n        <\u002Fsvg>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ─────────────── 7. WHY NOW ─────────────── -->\n  <section data-label=\"07 Why now\">\n    <div class=\"s7\">\n      <div class=\"eyebrow\">Why this is now possible<\u002Fdiv>\n      <h1 class=\"slide-title\" style=\"margin-top: 18px;\">Three things had to converge<\u002Fh1>\n\n      <div class=\"s7-grid\">\n        <div class=\"s7-card\">\n          <svg class=\"icon\" viewBox=\"0 0 64 64\" fill=\"none\" stroke=\"#374B73\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n            <rect x=\"18\" y=\"6\" width=\"28\" height=\"52\" rx=\"4\"><\u002Frect>\n            <line x1=\"18\" y1=\"14\" x2=\"46\" y2=\"14\"><\u002Fline>\n            <line x1=\"18\" y1=\"50\" x2=\"46\" y2=\"50\"><\u002Fline>\n            <circle cx=\"32\" cy=\"54\" r=\"1.4\" fill=\"#374B73\"><\u002Fcircle>\n          <\u002Fsvg>\n          <div class=\"h\">An instrument almost everyone already carries.<\u002Fdiv>\n          <div class=\"b\">Smartphones now sit in nearly every pocket on earth. They can sense, gently, in the background, patterns of sleep, movement, social contact, and routine, with no effort from the person.<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"s7-card\">\n          <svg class=\"icon\" viewBox=\"0 0 64 64\" fill=\"none\" stroke=\"#374B73\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n            <rect x=\"8\" y=\"20\" width=\"44\" height=\"24\" rx=\"3\"><\u002Frect>\n            <rect x=\"52\" y=\"26\" width=\"4\" height=\"12\" rx=\"1\" fill=\"#374B73\"><\u002Frect>\n            <rect x=\"14\" y=\"26\" width=\"32\" height=\"12\" fill=\"#FFC233\" stroke=\"none\" opacity=\"0.6\"><\u002Frect>\n          <\u002Fsvg>\n          <div class=\"h\">A way to do this without draining the battery.<\u002Fdiv>\n          <div class=\"b\">It has taken years to engineer sensing that lasts a full day on a phone without the person noticing.<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"s7-card\">\n          <svg class=\"icon\" viewBox=\"0 0 64 64\" fill=\"none\" stroke=\"#374B73\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n            <path d=\"M 6 38 Q 16 22 26 38 T 46 38 T 60 32\"><\u002Fpath>\n            <circle cx=\"16\" cy=\"38\" r=\"1.6\" fill=\"#374B73\"><\u002Fcircle>\n            <circle cx=\"36\" cy=\"34\" r=\"1.6\" fill=\"#374B73\"><\u002Fcircle>\n            <circle cx=\"52\" cy=\"34\" r=\"1.6\" fill=\"#374B73\"><\u002Fcircle>\n          <\u002Fsvg>\n          <div class=\"h\">The science to make sense of what's sensed.<\u002Fdiv>\n          <div class=\"b\">Methods for finding stable behavioural patterns, and predicting health outcomes from them, have only recently matured.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"s7-coda\">The instrument exists. The science is ready. The vivome can finally be measured.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ─────────────── 8. WHAT WE'VE BUILT ─────────────── -->\n  <section data-label=\"08 What we've built\">\n    <div class=\"s8\">\n      <div class=\"eyebrow\">What we've built<\u002Fdiv>\n      <h1 class=\"slide-title\" style=\"margin-top: 18px;\">Rumii. The instrument for the vivome.<\u002Fh1>\n      <p class=\"s8-lede\">Rumii is the first end-to-end instrument for measuring and acting on the vivome.<\u002Fp>\n\n      <div class=\"s8-flow\">\n        <div class=\"s8-step\">\n          <div class=\"n\">01<\u002Fdiv>\n          <div class=\"h\">Sensing<\u002Fdiv>\n          <div class=\"b\">A smartphone sensing layer that runs gently in the background.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"s8-step\">\n          <div class=\"n\">02<\u002Fdiv>\n          <div class=\"h\">Patterns<\u002Fdiv>\n          <div class=\"b\">A pattern-recognition pipeline turns those signals into stable signatures of how someone is living.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"s8-step\">\n          <div class=\"n\">03<\u002Fdiv>\n          <div class=\"h\">Reasoning<\u002Fdiv>\n          <div class=\"b\">A clinically-led reasoning system translates those patterns into context-appropriate support.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"s8-step\">\n          <div class=\"n\">04<\u002Fdiv>\n          <div class=\"h\">Learning<\u002Fdiv>\n          <div class=\"b\">A model that learns, over time, what helps whom, across conditions and contexts.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"s8-coda\">Built on the science of <strong>how behaviour shapes biology, and behaviour shapes mind<\u002Fstrong>. Designed within a clinical psychology framework. Live, running, and gathering data now.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ─────────────── 9. RESEARCH ─────────────── -->\n  <section data-label=\"09 What this opens up for research\">\n    <div class=\"s9\">\n      <div>\n        <div class=\"eyebrow\">For research<\u002Fdiv>\n        <h1 class=\"slide-title\" style=\"margin-top: 12px; font-size: 58px;\">A new layer for old questions.<br>And new questions for the field.<\u002Fh1>\n        <p class=\"s9-lede\">A continuous, real-world measurement of how people live transforms what we can study.<\u002Fp>\n\n        <div class=\"s9-qs\">\n          <div class=\"q\">Which <strong>behavioural patterns<\u002Fstrong> predict who gets well, who doesn't, and why?<\u002Fdiv>\n          <div class=\"q\">Which patterns of daily life <strong>mediate how a treatment works<\u002Fstrong>: for whom, and in what context?<\u002Fdiv>\n          <div class=\"q\">Which patterns <strong>precede flare, relapse, decline<\u002Fstrong>, early enough to act?<\u002Fdiv>\n          <div class=\"q\">Does the vivome explain <strong>some of what our other layers currently miss<\u002Fstrong>?<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"s9-coda\">The vivome can sit alongside the studies that are already underway, adding ecological reality to clinical and biological data without burdening the people taking part.<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div>\n        <svg viewBox=\"0 0 460 620\" width=\"100%\" height=\"100%\" style=\"max-height: 820px;\">\n          <!-- Stacked layers, with vivome added at bottom in colour -->\n          <g font-family=\"'Lato', sans-serif\" font-size=\"22\" fill=\"#374B73\">\n            <!-- Layer 1 -->\n            <rect x=\"40\" y=\"60\" width=\"380\" height=\"58\" fill=\"none\" stroke=\"#374B73\" stroke-width=\"1\" stroke-dasharray=\"3 3\" opacity=\"0.5\"><\u002Frect>\n            <text x=\"60\" y=\"96\">Genomic data<\u002Ftext>\n\n            <rect x=\"40\" y=\"135\" width=\"380\" height=\"58\" fill=\"none\" stroke=\"#374B73\" stroke-width=\"1\" stroke-dasharray=\"3 3\" opacity=\"0.5\"><\u002Frect>\n            <text x=\"60\" y=\"171\">Molecular &amp; biochemical data<\u002Ftext>\n\n            <rect x=\"40\" y=\"210\" width=\"380\" height=\"58\" fill=\"none\" stroke=\"#374B73\" stroke-width=\"1\" stroke-dasharray=\"3 3\" opacity=\"0.5\"><\u002Frect>\n            <text x=\"60\" y=\"246\">Microbiome<\u002Ftext>\n\n            <rect x=\"40\" y=\"285\" width=\"380\" height=\"58\" fill=\"none\" stroke=\"#374B73\" stroke-width=\"1\" stroke-dasharray=\"3 3\" opacity=\"0.5\"><\u002Frect>\n            <text x=\"60\" y=\"321\">Environmental exposures<\u002Ftext>\n\n            <rect x=\"40\" y=\"360\" width=\"380\" height=\"58\" fill=\"none\" stroke=\"#374B73\" stroke-width=\"1\" stroke-dasharray=\"3 3\" opacity=\"0.5\"><\u002Frect>\n            <text x=\"60\" y=\"396\">Clinical observations<\u002Ftext>\n\n            <!-- The new vivome layer -->\n            <rect x=\"40\" y=\"445\" width=\"380\" height=\"78\" fill=\"#FFAEA5\" opacity=\"0.5\" stroke=\"#374B73\" stroke-width=\"1.4\"><\u002Frect>\n            <text x=\"60\" y=\"480\" font-weight=\"700\" fill=\"#374B73\" font-size=\"24\">The vivome<\u002Ftext>\n            <text x=\"60\" y=\"506\" font-size=\"18\" font-weight=\"400\" font-style=\"italic\" fill=\"#374B73\">how people are actually living<\u002Ftext>\n          <\u002Fg>\n\n          <!-- Bracket -->\n          <g stroke=\"#374B73\" stroke-width=\"1.2\" fill=\"none\" opacity=\"0.7\">\n            <path d=\"M 430 60 Q 440 60 440 80 L 440 393 Q 440 418 430 418\"><\u002Fpath>\n          <\u002Fg>\n          <text x=\"448\" y=\"245\" font-family=\"'Raleway', sans-serif\" font-style=\"italic\" font-size=\"14\" fill=\"#888780\" transform=\"rotate(90 448 245)\">existing layers<\u002Ftext>\n\n          <!-- Plus marker -->\n          <g transform=\"translate(460, 479)\">\n            <circle r=\"14\" fill=\"#FFC233\" opacity=\"0.85\"><\u002Fcircle>\n            <line x1=\"-7\" y1=\"0\" x2=\"7\" y2=\"0\" stroke=\"#374B73\" stroke-width=\"2\"><\u002Fline>\n            <line x1=\"0\" y1=\"-7\" x2=\"0\" y2=\"7\" stroke=\"#374B73\" stroke-width=\"2\"><\u002Fline>\n          <\u002Fg>\n\n          <text x=\"230\" y=\"570\" text-anchor=\"middle\" font-family=\"'Raleway', sans-serif\" font-style=\"italic\" font-size=\"16\" fill=\"#888780\">added, not replacing<\u002Ftext>\n        <\u002Fsvg>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ─────────────── 10. WHERE WE ARE ─────────────── -->\n  <section data-label=\"10 Where we are now\">\n    <div class=\"s10\">\n      <div class=\"eyebrow\">Where we are now<\u002Fdiv>\n      <h1 class=\"slide-title\" style=\"margin-top: 18px;\">What's already in motion<\u002Fh1>\n      <p class=\"s10-lede\"><strong>The instrument is built. The science is in flight. The partnerships are forming.<\u002Fstrong><\u002Fp>\n\n      <div class=\"s10-rows\">\n        <div class=\"s10-row\">\n          <span class=\"marker\"><\u002Fspan>\n          <div class=\"text\">\n            <strong>Smartphone sensing live and running<\u002Fstrong>\n            With strong real-world participation rates.\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"s10-row\">\n          <span class=\"marker\"><\u002Fspan>\n          <div class=\"text\">\n            <strong>First clinical trial deployment<\u002Fstrong>\n            With a research partner, actively being set up.\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"s10-row\">\n          <span class=\"marker sage\"><\u002Fspan>\n          <div class=\"text\">\n            <strong>European research consortium<\u002Fstrong>\n            Youth mental health, multi-site, multi-country.\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"s10-row\">\n          <span class=\"marker gold\"><\u002Fspan>\n          <div class=\"text\">\n            <strong>Funded by Innovate UK<\u002Fstrong>\n            Supported by the National Health Service Clinical Entrepreneur Programme.\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"s10-row\">\n          <span class=\"marker gold\"><\u002Fspan>\n          <div class=\"text\">\n            <strong>A strategic anchor in global pharma<\u002Fstrong>\n            Backing the work as it scales.\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"s10-coda\">Real, funded, and moving.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ─────────────── 11. IMPLICATIONS & APPLICATIONS ─────────────── -->\n  <section data-label=\"11 Implications and applications\">\n    <div class=\"s11i\">\n      <div class=\"s11i-col\">\n        <div class=\"eyebrow\">Implications<\u002Fdiv>\n        <div class=\"s11i-h\">A real-world model<br>of population health<\u002Fdiv>\n        <p class=\"s11i-lede\">Continuous measurement of how people are actually living, at scale, makes a new kind of model possible.<\u002Fp>\n        <div class=\"s11i-emph\">\n          A real-world model that learns to predict population health trajectories, and when and how to intervene, in ways that optimise health.\n          <span class=\"lighter\">Not in the abstract. In the lives people are actually living.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"s11i-col\">\n        <div class=\"eyebrow\">Applications<\u002Fdiv>\n        <div class=\"s11i-h\">Where this becomes useful<\u002Fdiv>\n\n        <div class=\"s11i-apps\">\n          <div class=\"s11i-app\">\n            <div class=\"num\">01<\u002Fdiv>\n            <div class=\"body\"><strong>Clinical trials<\u002Fstrong>Supporting engagement and retention across the life of a study.<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"s11i-app\">\n            <div class=\"num\">02<\u002Fdiv>\n            <div class=\"body\"><strong>Real-world evidence<\u002Fstrong>Showing whether therapeutics actually work, in the lives of the people taking them.<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"s11i-app\">\n            <div class=\"num\">03<\u002Fdiv>\n            <div class=\"body\"><strong>Population health prediction<\u002Fstrong>Anticipating where need is rising, and where to act early.<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"s11i-app\">\n            <div class=\"num\">04<\u002Fdiv>\n            <div class=\"body\"><strong>Provider and payer planning<\u002Fstrong>Helping the people who plan and provide care match what they offer to what people actually need.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ─────────────── 12. INVITATION ─────────────── -->\n  <section data-label=\"12 The invitation\">\n    <div class=\"s11\">\n      <div class=\"s11-main\">\n        <div class=\"eyebrow\">The invitation<\u002Fdiv>\n        <h1 class=\"slide-title\" style=\"margin-top: 12px;\">What partnership could look like<\u002Fh1>\n        <p class=\"s11-lede\">We're looking for partners who see what we see. Specifically:<\u002Fp>\n\n        <div class=\"s11-list\">\n          <div class=\"item\">\n            <div class=\"who\">Researchers<\u002Fdiv>\n            <div>With cohort studies or trials underway, who could add the vivome layer to their existing biological, clinical, or psychological data.<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"item\">\n            <div class=\"who\">Clinicians<\u002Fdiv>\n            <div>Working in care pathways where what happens between appointments shapes what happens at the next one. And trial teams who want to lift engagement and retention, with operational signals on which participants are drifting toward dropout, early enough to reach them.<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"item\">\n            <div class=\"who\">People with lived experience<\u002Fdiv>\n            <div>Who would help shape what the vivome should and should not see, and how it should be acted on.<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"item\">\n            <div class=\"who\">Methodologists<\u002Fdiv>\n            <div>Who would help validate, characterise, and publish the first wave of vivome-based measurements.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"s11-coda\">The science of how the guest house is being lived in has, until now, been beyond our reach. It isn't anymore.<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"s11-art\" style=\"display: flex; flex-direction: column; justify-content: end; align-items: center; padding-bottom: 60px;\">\n        <!-- Doll's house, small, quiet -->\n        <svg viewBox=\"0 0 360 460\" width=\"100%\">\n          <!-- Ground -->\n          <line x1=\"20\" y1=\"430\" x2=\"340\" y2=\"430\" stroke=\"#374B73\" stroke-width=\"1\" opacity=\"0.4\"><\u002Fline>\n          <!-- Roof -->\n          <polygon points=\"80,180 180,90 280,180 305,165 205,75 180,90\" fill=\"#FFAEA5\"><\u002Fpolygon>\n          <polygon points=\"180,90 280,180 305,165 205,75\" fill=\"#FF9088\"><\u002Fpolygon>\n          <!-- Body -->\n          <rect x=\"80\" y=\"180\" width=\"200\" height=\"220\" fill=\"#374B73\"><\u002Frect>\n          <rect x=\"280\" y=\"180\" width=\"25\" height=\"220\" fill=\"#2A3A5C\"><\u002Frect>\n          <polygon points=\"280,180 305,165 305,385 280,400\" fill=\"#2A3A5C\"><\u002Fpolygon>\n          <!-- Windows lit -->\n          <rect x=\"98\" y=\"200\" width=\"32\" height=\"38\" fill=\"#FFC233\" opacity=\"0.85\"><\u002Frect>\n          <rect x=\"160\" y=\"200\" width=\"32\" height=\"38\" fill=\"#FFC233\" opacity=\"0.55\"><\u002Frect>\n          <rect x=\"222\" y=\"200\" width=\"32\" height=\"38\" fill=\"#FFC233\" opacity=\"0.85\"><\u002Frect>\n          <rect x=\"98\" y=\"290\" width=\"32\" height=\"32\" fill=\"#FFC233\" opacity=\"0.55\"><\u002Frect>\n          <rect x=\"222\" y=\"290\" width=\"32\" height=\"32\" fill=\"#FFC233\" opacity=\"0.85\"><\u002Frect>\n          <!-- Door -->\n          <rect x=\"158\" y=\"290\" width=\"46\" height=\"80\" fill=\"#712B13\"><\u002Frect>\n          <circle cx=\"195\" cy=\"332\" r=\"2\" fill=\"#FFC233\"><\u002Fcircle>\n          <!-- Caption -->\n          <text x=\"180\" y=\"455\" text-anchor=\"middle\" font-family=\"'Raleway', sans-serif\" font-style=\"italic\" font-size=\"15\" fill=\"#888780\">Lived in.<\u002Ftext>\n        <\u002Fsvg>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"rumi-footer\">* Rumi, <span class=\"work\">The Guest House<\u002Fspan>, trans. Coleman Barks<\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fdeck-stage>\n\n\n\n<\u002Fbody><\u002Fhtml>"
